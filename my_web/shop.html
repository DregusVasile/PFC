<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TestShop</title>
<link rel="stylesheet" href="shop.css">
</head>

<body>

<!-- HEADER -->
<div class="topbar">

  <div class="left-top">
    <h2>TestShop</h2>
    
  

    <div class="categories">
      <span id="categoryBtn" onclick="toggleCategories()">Categories ▼</span>

      <div id="categoryList" class="category-list">
        <!-- JS -->
      </div>
    </div>
  </div>

  <input id="search" placeholder="Search products..." onkeyup="search()">

  <div class="right-top">
    <span id="username">👤 User</span>
    🛒 <span id="cartCount">0</span>
  </div>

</div>

<h2 class="results">Results</h2>

<div id="products" class="products"></div>
<div id="cartBox" style="display:none; position:fixed; top:0; right:0; width:300px; height:100%; background:white; padding:20px; overflow:auto;">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
</div>

<!-- FOOTER -->
<footer>
  <div>
    <h3>Location</h3>
    <p>42 Maple Street</p>
    <p>Portland, OR 97201</p>
  </div>

  <div>
    <h3>Connect</h3>
    <p>hello@testshop.com</p>
    <p>(503) 555-0172</p>
  </div>

  <p class="copy">© 2026 TestShop. All rights reserved.</p>
</footer>

<script src="shop.js"></script>
</body>
</html>
