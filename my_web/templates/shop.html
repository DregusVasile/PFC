<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TestShop</title>
<link rel="stylesheet" href="/static/shop.css">
<link rel="stylesheet" href="/static/cart.css">
</head>

<body>
  <script src="/static/cart.js"></script>
  <script src="/static/shop.js"></script>

<!-- HEADER -->
<div class="topbar">

  <div class="left-top">
    <h2>TestShop</h2>
    
  

    <div class="categories">
     
      <span id="categoryBtn" onclick="toggleCategories()">Categories ▼</span>

      <div id="categoryList" class="category-list">
        <!-- JS -->

      </div>
    </div>
  </div>

  <input id="search" placeholder="Search products..." onkeyup="search()">

  <div class="right-top">
    <span id="username" onclick="openUser()">👤 User</span>
    <span class="cart-toggle" onclick="toggleCartPopup()">🛒 <span id="cartCount">0</span></span>
  </div>

</div>

<h2 class="results">Results</h2>
<div class="nav-btn left-btn" onclick="prevPage()">⬅</div>
<div class="nav-btn right-btn" onclick="nextPage()">➡</div>

<div id="products" class="products"></div>
<div id="cartPopup" class="cart-popup">
  <div class="cart-popup-header">
    <h3>Your Cart</h3>
    <button class="cart-popup-close" onclick="toggleCartPopup()">×</button>
  </div>
  <div class="cart-total-section">
    <div id="cartPopupTotal" class="cart-total">Total: 0 RON</div>
    <button class="buy-all-cart-btn" onclick="buyAllFromCart()">Buy All</button>
  </div>
  <div id="cartPopupItems" class="cart-items"></div>
</div>

<!-- FOOTER -->
<footer>
  <div>
    <h3>Location</h3>
    <p>42 Maple Street</p>
    <p>Portland, OR 97201</p>
  </div>

  <div>
    <h3>Connect</h3>
    <p>hello@testshop.com</p>
    <p>(503) 555-0172</p>
  </div>

  <p class="copy">© 2026 TestShop. All rights reserved.</p>
</footer>





</body>
</html>
