<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Product</title>
<link rel="stylesheet" href="/static/product.css">
<link rel="stylesheet" href="/static/cart.css">
</head>
<script src="{{ url_for('static', filename='cart.js') }}"></script>
<body>
    <div class="topbar">
  <h2>TestShop</h2>

  <div style="float:right">
    <span id="username" onclick="goProfile()" style="cursor:pointer"></span>
    <span class="cart-toggle" onclick="toggleCartPopup()">🛒 <span id="cartCount">0</span></span>
  </div>

</div>

<div id="cartPopup" class="cart-popup">
  <div class="cart-popup-header">
    <h3>Your Cart</h3>
    <button class="cart-popup-close" onclick="toggleCartPopup()">×</button>
  </div>
  <div class="cart-total-section">
    <div id="cartPopupTotal" class="cart-total">Total: 0 RON</div>
    <button class="buy-all-cart-btn" onclick="buyAllFromCart()">Buy All</button>
  </div>
  <div id="cartPopupItems" class="cart-items"></div>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <img id="img" onerror="this.src='https://via.placeholder.com/400'">
  </div>

  <!-- RIGHT -->
  <div class="right">
    <h1 id="name"></h1>

    <div class="stars" id="stars"></div>
    <p id="ratingCount"></p>
    <p id="stockInfo"></p>
    <p id="price"></p>

   <button onclick="addCurrentProduct()">Add</button>

    <div class="section">
      <h3>Seller Information</h3>
      <p><strong>Name:</strong> <span id="sellerName"></span></p>
      <p><strong>Phone:</strong> <span id="sellerPhone"></span></p>
      <p><strong>Email:</strong> <span id="sellerEmail"></span></p>
    </div>
  </div>
</div>

<!-- DESCRIPTION -->
<div class="section">
  <h3>Description</h3>
  <p id="desc"></p>
</div>

<!-- COMMENTS -->
<div class="section">
  <h3>Comments</h3>
  <textarea id="commentInput" placeholder="Write your comment here..."></textarea>
  <button onclick="addComment()">Add Comment</button>

  <div id="comments"></div>
</div>

<!-- RECOMMENDED -->
<div class="section">
  <h3>Recommended Products</h3>
  <div class="recommended-container">
    <button class="carousel-nav-btn" id="prevBtn" onclick="prevRecommended()">❮</button>
    <div class="recommended-carousel" id="recommended"></div>
    <button class="carousel-nav-btn" id="nextBtn" onclick="nextRecommended()">❯</button>
  </div>
</div>

<footer>
  <div>
    <h3>Location</h3>
    <p>42 Maple Street</p>
    <p>Portland, OR 97201</p>
  </div>
  <div>
    <h3>Connect</h3>
    <p>hello@testshop.com</p>
    <p>(503) 555-0172</p>
  </div>
  <p class="copy">© 2026 TestShop. All rights reserved.</p>
</footer>
<script src="/static/cart.js"></script>
<script>
let product = null;

async function loadProductData() {
  const selected = JSON.parse(localStorage.getItem("selectedProduct"));
  if (!selected) return;

  try {
    const res = await fetch("/all-products-json");
    const all = await res.json();
    product = all.find(p => p.id === selected.id) || selected;

    if (product) {
      document.getElementById("name").innerText = product.name;
      document.getElementById("price").innerText = product.price + " RON";
      document.getElementById("img").src = product.image;

      const stockInfo = document.getElementById("stockInfo");
      if (product.source === "my" || product.stock !== undefined) {
        const stock = Number(product.stock || 0);
        stockInfo.innerText = stock > 0 ? `Stoc: ${stock}` : "Stoc epuizat";
      } else {
        stockInfo.innerText = "Stoc infinit";
      }

      const currentUser = localStorage.getItem("currentUser") || "Guest";
      if (product.seller === currentUser) {
        // If current user is the seller, get their profile info
        const profilePhone = localStorage.getItem("profilePhone") || "0712345678";
        const profileEmail = localStorage.getItem("profileEmail") || "email@test.com";
        document.getElementById("sellerName").innerText = currentUser;
        document.getElementById("sellerPhone").innerText = profilePhone;
        document.getElementById("sellerEmail").innerText = profileEmail;
      } else {
        document.getElementById("sellerName").innerText = product.seller || "TestShop";
        document.getElementById("sellerPhone").innerText = product.sellerPhone || "0712345678";
        document.getElementById("sellerEmail").innerText = product.sellerEmail || "email@test.com";
      }

      document.getElementById("desc").innerText =
        product.description || "No description provided";

      loadRatings();
      loadComments();
      loadRecommended();
    }
  } catch (e) {
    console.error("Error loading product data:", e);
    product = selected;
    // Fallback
    if (product) {
      document.getElementById("name").innerText = product.name;
      document.getElementById("price").innerText = product.price + " RON";
      document.getElementById("img").src = product.image;
      // etc.
    }
  }
}

function updateSellerInfo() {
  if (!product) return;
  const currentUser = localStorage.getItem("currentUser") || "Guest";
  if (product.seller === currentUser) {
    const profilePhone = localStorage.getItem("profilePhone") || "0712345678";
    const profileEmail = localStorage.getItem("profileEmail") || "email@test.com";
    document.getElementById("sellerName").innerText = currentUser;
    document.getElementById("sellerPhone").innerText = profilePhone;
    document.getElementById("sellerEmail").innerText = profileEmail;
  }
}

const user = localStorage.getItem("currentUser") || "Guest";
document.getElementById("username").innerText = user;

// Track product view
const selected = JSON.parse(localStorage.getItem("selectedProduct"));
if (selected) {
  fetch("/track-view", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      productId: selected.id,
      user: user
    })
  });
}

loadProductData();

/* ⭐ RATING - SERVER SIDE */
async function loadRatings() {
  const res = await fetch("/get-ratings");
  const ratings = await res.json();
  renderStars(ratings);
}

async function renderStars(ratings) {
  const starsDiv = document.getElementById("stars");
  starsDiv.innerHTML = "";

  const productIdStr = String(product.id);
  let avg = 0;
  let count = 0;

  if(ratings[productIdStr]) {
    const productRating = ratings[productIdStr];
    if(productRating.count > 0) {
      avg = productRating.total / productRating.count;
      count = productRating.count;
    }
  }

  for(let i = 1; i <= 5; i++) {
    const s = document.createElement("span");
    s.innerText = i <= Math.round(avg) ? "⭐" : "☆";
    s.onclick = () => rate(i);
    starsDiv.appendChild(s);
  }

  document.getElementById("ratingCount").innerText =
    "Ratings: " + count + " | Avg: " + avg.toFixed(1);
}

async function rate(val) {
  await fetch("/rate", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      productId: product.id,
      user: user,
      value: val
    })
  });

  loadRatings();
}

loadRatings();

/* COMMENTS */
async function addComment(){
  const text = document.getElementById("commentInput").value.trim();

  if(!text) {
    alert("Please write a comment!");
    return;
  }

  const res = await fetch("/add-comment", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      user:user,
      product:product.id,
      text:text
    })
  });

  const result = await res.json();
  
  if(result.status === "limit") {
    alert("You have reached the limit of 30 comments per product!");
  } else {
    document.getElementById("commentInput").value = "";
    loadComments();
  }
}

async function loadComments(){
  const res = await fetch("/comments");
  const all = await res.json();

  const list = all.filter(c => c.product === product.id);
  renderComments(list);
}

async function deleteComment(id){
  if(!confirm("Are you sure you want to delete this comment?")) return;

  const res = await fetch("/delete-comment", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      id:id,
      user:user
    })
  });

  const result = await res.json();
  if(result.status === "unauthorized") {
    alert("You can only delete your own comments!");
  } else {
    loadComments();
  }
}

async function editComment(id, currentText){
  const newText = prompt("Edit comment:", currentText);

  if(newText === null || newText.trim() === "") return;

  const res = await fetch("/edit-comment", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      id:id,
      user:user,
      text:newText.trim()
    })
  });

  const result = await res.json();
  if(result.status === "unauthorized") {
    alert("You can only edit your own comments!");
  } else {
    loadComments();
  }
}

function renderComments(list){
  const box = document.getElementById("comments");
  box.innerHTML = "";

  const isAdmin = localStorage.getItem("currentUserIsAdmin") === "true";

  list.forEach(c=>{
    const canEdit = c.user === user;
    const canDelete = c.user === user || isAdmin;

    const div = document.createElement("div");
    div.className = "comment";

    let editedTag = c.edited ? `<span class="comment-edited">(edited)</span>` : "";
    const menuHtml = (canEdit || canDelete) ? `
      <button class="comment-menu-btn" onclick="toggleMenu(${c.id})">⋮</button>
      <div class="comment-menu" id="menu-${c.id}" style="display:none">
        ${canEdit ? `<button onclick="editComment(${c.id}, \`${c.text.replace(/`/g, '\`')}\`)">Edit</button>` : ""}
        ${canDelete ? `<button onclick="deleteComment(${c.id})">Delete</button>` : ""}
      </div>
    ` : "";

    div.innerHTML = `
      <div class="comment-header">
        <span class="comment-user">${c.user}</span>
        <span class="comment-time">${new Date(c.timestamp).toLocaleString()}</span>
      </div>
      <div class="comment-text">${c.text}</div>
      ${editedTag}
      ${menuHtml}
    `;

    box.appendChild(div);
  });
}

function toggleMenu(id){
  const el = document.getElementById("menu-" + id);
  if(el) {
    el.style.display = el.style.display === "none" ? "block" : "none";
  }
}

loadComments();

/* 🔁 RECOMMENDED CAROUSEL */
let recommendedProducts = [];
let recommendedIndex = 0;

function getItemsPerView() {
  const width = window.innerWidth;
  if (width < 600) return 2;
  if (width < 900) return 4;
  return 5;
}

async function loadRecommended(){
  const res = await fetch(`/get-recommended/${product.id}`);
  const data = await res.json();
  recommendedProducts = data.products;
  renderRecommended();
  updateCarouselButtons();
}

function renderRecommended() {
  const box = document.getElementById("recommended");
  box.innerHTML = "";

  const end = Math.min(recommendedIndex + getItemsPerView(), recommendedProducts.length);

  for(let i = recommendedIndex; i < end; i++) {
    const p = recommendedProducts[i];
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.image}" onerror="this.src='https://via.placeholder.com/150'">
      <div class="card-name">${p.name}</div>
      <div class="card-price">${p.price} RON</div>
    `;

    div.onclick = () => {
      localStorage.setItem("selectedProduct", JSON.stringify(p));
      location.reload();
    };

    box.appendChild(div);
  }
}

function updateCarouselButtons() {
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  prevBtn.disabled = recommendedIndex === 0;
  nextBtn.disabled = recommendedIndex + getItemsPerView() >= recommendedProducts.length;
}

window.prevRecommended = function() {
  if(recommendedIndex > 0) {
    recommendedIndex -= getItemsPerView();
    if(recommendedIndex < 0) recommendedIndex = 0;
    renderRecommended();
    updateCarouselButtons();
  }
}

window.nextRecommended = function() {
  if(recommendedIndex + getItemsPerView() < recommendedProducts.length) {
    recommendedIndex += getItemsPerView();
    renderRecommended();
    updateCarouselButtons();
  }
}

window.addEventListener("resize", () => {
  if (!recommendedProducts.length) return;
  recommendedIndex = Math.min(
    recommendedIndex,
    Math.max(0, recommendedProducts.length - getItemsPerView())
  );
  renderRecommended();
  updateCarouselButtons();
});

function goProfile(){
  window.location.href = "/user";
}

async function addCurrentProduct(){
  const response = await addToCart(product);
  if (response && response.ok) {
    await updateCartUI();
  }
}

async function buyAll(){
  const quantity = parseInt(document.getElementById("buyQuantity").value, 10) || 1;
  if (quantity < 1) {
    alert("Trebuie să selectezi cel puțin 1 produs.");
    return;
  }

  const productStock = Number(product.stock || 0);
  if (product.source === "my") {
    if (productStock <= 0) {
      alert("Nu mai sunt produse disponibile în stoc.");
      return;
    }
    if (quantity > productStock) {
      alert("Nu mai sunt suficiente produse în stoc.");
      return;
    }
  }

  const profileEmail = localStorage.getItem("profileEmail") || "email@gamil.com";
  const profileName = localStorage.getItem("profileName") || currentUser;

  const response = await fetch("/buy-all", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      user: currentUser,
      userId: profileName,
      email: profileEmail,
      quantity,
      product
    })
  });

  const data = await response.json();
  if (data.status === "ok") {
    alert("Cumpărat cu succes!");
    if (product.source === "my") {
      const remaining = productStock - quantity;
      product.stock = remaining > 0 ? remaining : 0;
      document.getElementById("stockInfo").innerText = remaining > 0 ? `Stoc: ${remaining}` : "Stoc epuizat";
      if (remaining <= 0) {
        document.getElementById("buyQuantity").value = 1;
      }
    }
  } else {
    alert(data.message || "Eroare la cumpărare.");
  }
}
</script>


</body>
</html>
