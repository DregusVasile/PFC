<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Page</title>
  <link rel="stylesheet" href="/static/user.css">
</head>
<body>
  <div class="user-page">
    <header class="profile-header">
      <div class="profile-card">
        <button class="avatar" id="avatarCircle" onclick="openImageModal('avatar')" type="button"></button>
        <div class="profile-summary">
          <div class="profile-title-row">
            <div>
              <h1 id="displayName">Nume Utilizator</h1>
              <div class="profile-username" id="profileUsername">@Guest</div>
            </div>
            <button class="logout-btn" onclick="logout()">Log Out</button>
          </div>
        </div>
      </div>
      <button class="add-product-fab" onclick="scrollToAddProduct()">+ Adaugă Product</button>
    </header>

    <section class="status-cards">
      <div class="status-card status-card-yellow">
        <div class="status-badge" id="yourProductsBadge" onclick="editBadgeIfAdmin('yourProducts')"></div>
        <div class="status-text">
          <div class="status-label">Produsele tale</div>
          <div class="status-value" id="yourProductsCount">0</div>
        </div>
      </div>
      <div class="status-card status-card-blue">
        <div class="status-badge" id="cartProductsBadge" onclick="editBadgeIfAdmin('cartProducts')"></div>
        <div class="status-text">
          <div class="status-label">Produse în coș</div>
          <div class="status-value" id="cartProductsCount">0</div>
        </div>
      </div>
    </section>

    <section class="profile-details" id="profileDetails">
      <div class="profile-details-header">
        <h2>Info cont</h2>
        <button class="edit-profile-btn" id="editBtn" onclick="toggleEdit()">Editează</button>
      </div>
      <div class="profile-block">
        <div class="detail-row">
          <span class="detail-label">Nume:</span>
          <span class="detail-value" id="nameText"></span>
          <input class="detail-input" id="nameInput" type="text" />
        </div>
        <div class="detail-row">
          <span class="detail-label">Nr. de telefon:</span>
          <span class="detail-value" id="phoneText"></span>
          <input class="detail-input" id="phoneInput" type="tel" />
        </div>
        <div class="detail-row">
          <span class="detail-label">Email:</span>
          <span class="detail-value" id="emailText"></span>
          <input class="detail-input" id="emailInput" type="email" />
        </div>
        <div class="detail-row">
          <span class="detail-label">Țară:</span>
          <span class="detail-value" id="countryText"></span>
          <input class="detail-input" id="countryInput" type="text" />
        </div>
        <div class="detail-row">
          <span class="detail-label">Localitate:</span>
          <span class="detail-value" id="localityText"></span>
          <input class="detail-input" id="localityInput" type="text" />
        </div>
      </div>
    </section>

    <section class="add-product-section" id="addProductSection">
      <h2>Adaugă produs</h2>
      <div class="add-product-grid">
        <label class="form-row-left">
          Nume produs
          <input id="productName" placeholder="Product name" />
        </label>
        <label class="form-row-right">
          Preț
          <input id="productPrice" placeholder="Price" type="number" min="1" step="1" />
        </label>
        
        <label class="form-row-left">
          Nr. produse
          <input id="productStock" type="number" min="1" step="1" value="1" />
        </label>
        <label class="form-row-right category-wrapper">
          Categorie
          <div class="category-input-wrapper">
            <input id="productCategory" placeholder="Category" onfocus="showCategoryOptions()" autocomplete="off" />
            <div id="categoryOptions" class="category-options"></div>
          </div>
        </label>
        
        <label class="form-row-full">
          Imagine URL
          <input id="productImage" placeholder="Image URL" />
        </label>

        <label class="form-row-full">
          Descriere
          <textarea id="productDesc" maxlength="300" placeholder="Description (max 300 chars)"></textarea>
        </label>
      </div>
      <button class="save-product-btn" onclick="addProducts()">Adaugă</button>
    </section>
  </div>

  <div id="imageModal" class="modal hidden">
    <div class="modal-dialog">
      <h3 id="imageModalTitle">Încarcă PNG</h3>
      <input id="imageFileInput" type="file" accept="image/png" />
      <div id="imagePreview" class="image-preview"></div>
      <div class="modal-actions">
        <button type="button" class="modal-button cancel" onclick="closeImageModal()">Anulează</button>
        <button type="button" class="modal-button save" onclick="saveImageSelection()">Salvează</button>
      </div>
    </div>
  </div>

  <script src="/static/user.js"></script>
</body>
</html>
