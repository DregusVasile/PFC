<meta charset="UTF-8">
<title>Magazin cu Recomandări</title>
<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}
.container{
width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}
button{
padding:8px 15px;
margin:5px;
cursor:pointer;
}
.product{
border:1px solid #ccc;
margin:5px;
padding:10px;
border-radius:5px;
display:flex;
align-items:center;
justify-content:space-between;
}
#products{
max-height:450px;
overflow-y:auto;
}
.recommend{
background:#e8f5e9;
}
select,input{
padding:7px;
margin:5px;
}

.auth-row{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-bottom:15px;
}

.filters{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:10px;
}

.filter-col{
display:flex;
flex-direction:column;
align-items:flex-start;
}
</style>
</head>

<div class="container">
<h1>Magazin Online</h1>
<div id="auth">
<h2>Autentificare</h2>
<div class="auth-row">
<div>
<h3>Log In</h3>
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Parolă">
<br>
<button onclick="login()">Log In</button>
</div>
<div>
<h3>Sign Up</h3>
<input id="signUser" placeholder="Username nou">
<input id="signPass" type="password" placeholder="Parolă nouă">
<br>
<button onclick="signup()">Sign Up</button>
</div>
</div>
</div>
<div id="shop" style="display:none">
<h2 id="welcome"></h2>
<div class="filters">
<div class="filter-col">

<select id="categorySelect" onchange="loadSubcategories()"></select>
</div>
<div class="filter-col">
<label>Subcategoria</label>
<select id="subSelect" onchange="showProducts()"></select>
</div>
</div>
<div>

function signup(){
  const user = document.getElementById("signUser").value.trim()
  const pass = document.getElementById("signPass").value.trim()

  if(!user || !pass){
    alert("Completează toate câmpurile")
    return
  }

  if(localStorage.getItem("user"+user)){
    alert("Utilizatorul există deja")
    return
  }

  localStorage.setItem("user"+user, pass)
  alert("Cont creat! Te autentificăm...")
  loginUser(user)
}

function login(){
  const user = document.getElementById("loginUser").value.trim()
  const pass = document.getElementById("loginPass").value.trim()
  if(!user || !pass){
    alert("Completează toate câmpurile")
    return
  }

  const stored = localStorage.getItem("user"+user)
  if(stored && stored === pass){
    loginUser(user)
    return
  }

  alert("Username sau parolă incorectă")
}

function loginUser(user){
  currentUser = user
  document.getElementById("auth").style.display = "none"
  document.getElementById("shop").style.display = "block"
  document.getElementById("welcome").innerText = "Bine ai venit " + user
  loadCategories()
  showProducts(true)
}

function loadCategories(){
  let cats = [...new Set(products.map(p=>p.cat))].sort()
  cats.unshift("Toate")

  const select = document.getElementById("categorySelect")
  select.innerHTML = ""
  cats.forEach(c=>{
    select.innerHTML += `<option>${c}</option>`
  })

  loadSubcategories()
}

function loadSubcategories(){
  const cat = document.getElementById("categorySelect").value
  const select = document.getElementById("subSelect")

  if(cat === "Toate"){
    select.innerHTML = `<option>Toate</option>`
    select.disabled = true
    showProducts(true)
    return
  }

  select.disabled = false
  let subs = [...new Set(products.filter(p=>p.cat===cat).map(p=>p.sub))].sort()
  subs.unshift("Toate")

  select.innerHTML = ""
  subs.forEach(s=>{
    select.innerHTML += `<option>${s}</option>`
  })

  showProducts()
}

function showProducts(forceAll=false){
  const cat = document.getElementById("categorySelect").value
  const sub = document.getElementById("subSelect").value

  let list = products
  if(!forceAll){
    if(cat !== "Toate"){
      list = list.filter(p=>p.cat===cat)
      if(sub && sub !== "Toate"){
        list = list.filter(p=>p.sub===sub)
      }
    }
  }

  renderProducts(list)
}

function renderProducts(list){
  const div = document.getElementById("products")
  div.innerHTML = ""

  if(list.length === 0){
    div.innerHTML = "<p>Nu există produse pentru acest filtru.</p>"
    return
  }

  list.forEach(p=>{
    div.innerHTML += `
      <div class="product">
        <span><b>${p.name}</b></span>
        <button onclick="buy('${p.name}','${p.cat}','${p.sub}')">Buy</button>
      </div>
    `
  })
}

function searchProduct(){
  const text = document.getElementById("search").value.toLowerCase()
  const list = products.filter(p=>p.name.toLowerCase().includes(text))
  renderProducts(list)
}

function buy(name,cat,sub){
  const key = "data_" + currentUser
  const data = JSON.parse(localStorage.getItem(key)) || []
  data.push({name,cat,sub})
  localStorage.setItem(key,JSON.stringify(data))

  recommendGeneral(cat,sub)
  recommendUsers(name,cat,sub)
}

function recommendGeneral(cat,sub){
  const rec = products.filter(p=>p.cat===cat && p.sub===sub)
  const div = document.getElementById("generalRec")
  div.innerHTML = ""
  rec.slice(0,3).forEach(p=>{
    div.innerHTML += `<div class="product recommend">${p.name}</div>`
  })
}

function recommendUsers(product, cat, sub){
  const counts = {}
  for(let i=1;i<=DEMO_USER_COUNT;i++){
    const u = "user"+i
    const data = JSON.parse(localStorage.getItem("data_"+u)) || []
    data.forEach(p=>{
      if(p.name !== product && p.cat === cat && p.sub === sub){
        counts[p.name] = (counts[p.name]||0) + 1
      }
    })
  }

  const sorted = Object.keys(counts).sort((a,b)=>counts[b]-counts[a])
  const div = document.getElementById("userRec")
  div.innerHTML = ""
  sorted.slice(0,3).forEach(p=>{
    div.innerHTML += `<div class="product recommend">${p}</div>`
  })
}
